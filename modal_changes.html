  STEP 3 — Replace your existing renderEstimationResults function
           AND add the modal logic block shown below, inside <script>
  ═══════════════════════════════════════════════════════════════════
-->
<script>
/* ── CONFIG: set your WhatsApp business number (digits only, with country code) */
const WHATSAPP_NUMBER = '919876543210'; // ← replace with your actual number

/* ── Helper: format number as INR string ─────────────────────────────────── */
const inr = (n) => 'Rs. ' + Math.round(Number(n)).toLocaleString('en-IN');

/* ── Modal references ────────────────────────────────────────────────────── */
const carModal        = document.getElementById('car-detail-modal');
const carModalClose   = document.getElementById('car-modal-close');
const confirmBtn      = document.getElementById('modal-confirm-btn');
const confirmLabel    = document.getElementById('modal-confirm-label');
const confirmSpinner  = document.getElementById('modal-confirm-spinner');
const whatsappBtn     = document.getElementById('modal-whatsapp-btn');
const modalSuccessMsg = document.getElementById('modal-success-msg');
const modalErrorMsg   = document.getElementById('modal-error-msg');

/* Stored booking payload for the confirm action */
let currentBookingPayload = null;

/* ── Close modal ─────────────────────────────────────────────────────────── */
const closeModal = () => {
  const carModal = document.getElementById('car-detail-modal');
  if (!carModal) return;
  carModal.hidden = true;
  document.body.style.overflow = '';
  document.getElementById('modal-success-msg').hidden  = true;
  document.getElementById('modal-error-msg').hidden    = true;
  document.getElementById('modal-whatsapp-btn').hidden = true;
  document.getElementById('modal-confirm-btn').hidden  = false;
  document.getElementById('modal-confirm-label').hidden   = false;
  document.getElementById('modal-confirm-spinner').hidden = true;
  document.getElementById('modal-confirm-btn').disabled   = false;
  currentBookingPayload = null;
};

document.addEventListener('DOMContentLoaded', () => {
  const carModalClose = document.getElementById('car-modal-close');
  const carModal      = document.getElementById('car-detail-modal');

  if (carModalClose) carModalClose.addEventListener('click', closeModal);

  if (carModal) {
    carModal.addEventListener('click', (e) => {
      if (e.target === carModal) closeModal();
    });
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && carModal && !carModal.hidden) closeModal();
  });
});
/* ── Open WhatsApp ───────────────────────────────────────────────────────── */
const openWhatsApp = (p) => {
  const allowanceLine = Number(p.driver_allowance) > 0
    ? `\n🧑‍✈️ Driver Allowance : ${inr(p.driver_allowance)}`
    : '';

  const tripLabel = p.trip_type === 'two-way'
    ? `Round Trip (${p.trip_days} day${p.trip_days !== '1' ? 's' : ''})`
    : 'One Way';

  const msg = [
    `🚖 *New Booking – White Call Taxi*`,
    ``,
    `*Vehicle :* ${p.vehicle}`,
    `*Trip    :* ${tripLabel}`,
    ``,
    `👤 *Passenger*`,
    `Name   : ${p.name}`,
    `Mobile : ${p.mobile}`,
    `Email  : ${p.email}`,
    ``,
    `📍 *Journey*`,
    `Pickup   : ${p.pickup}`,
    `Drop     : ${p.drop}`,
    `Distance : ${p.distance_km} km`,
    `Date     : ${p.date}  |  Time : ${p.time}`,
    ``,
    `💰 *Fare Breakdown*`,
    `Base Fare        : ${inr(p.base_fare)}`,
    `Distance Charge  : ${inr(p.dist_charge)}  (${p.distance_km} km × Rs.${p.per_km}/km)`,
    `${Number(p.driver_allowance) > 0 ? `Driver Allowance : ${inr(p.driver_allowance)}` : ''}`,
    `*TOTAL           : ${inr(p.total_fare)}*`,
  ].filter(l => l !== undefined).join('\n');

  const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank', 'noopener,noreferrer');
};

/* ── Confirm button: send email then open WhatsApp ───────────────────────── */
if (confirmBtn) {
  confirmBtn.addEventListener('click', async () => {
    if (!currentBookingPayload) return;

    // Loading state
    confirmLabel.hidden = true;
    confirmSpinner.hidden = false;
    confirmBtn.disabled = true;
    modalSuccessMsg.hidden = true;
    modalErrorMsg.hidden = true;

    try {
      const res = await fetch('send_booking.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify(currentBookingPayload),
      });

      const json = await res.json();

      if (!res.ok || !json.success) {
        throw new Error(json.error || 'Failed to send confirmation email.');
      }

      // Success — show success message, reveal WhatsApp button
      modalSuccessMsg.hidden = false;
      whatsappBtn.hidden = false;
      confirmBtn.hidden = true;

      // Auto-open WhatsApp after a short delay
      setTimeout(() => openWhatsApp(currentBookingPayload), 800);

    } catch (err) {
      modalErrorMsg.textContent = '⚠️ ' + (err.message || 'Could not send email. Please try again.');
      modalErrorMsg.hidden = false;
      // Restore button
      confirmLabel.hidden = false;
      confirmSpinner.hidden = true;
      confirmBtn.disabled = false;
    }
  });
}

/* ── WhatsApp button (manual re-open) ───────────────────────────────────── */
if (whatsappBtn) {
  whatsappBtn.addEventListener('click', () => {
    if (currentBookingPayload) openWhatsApp(currentBookingPayload);
  });
}

/* ── UPDATED renderEstimationResults ─────────────────────────────────────── */
const renderEstimationResults = (results, distanceKm, tripType, tripDays) => {
  if (!resultsWrapper || !resultsGrid || !resultsSummary) return;

  resultsGrid.innerHTML = '';

  // Collect form values once
  const nameVal   = document.getElementById('name')?.value   || '-';
  const emailVal  = document.getElementById('email')?.value  || '-';
  const mobileVal = mobileInput.value  || '-';
  const pickupVal = pickupInput.value  || '-';
  const dropVal   = dropInput.value    || '-';
  const dateVal   = document.getElementById('date')?.value   || '-';
  const timeVal   = document.getElementById('time')?.value   || '-';

  results.forEach((item) => {
    const distCharge = item.travelDistance * item.perKm;

    const card = document.createElement('article');
    card.className = 'estimate-card';
    card.innerHTML = `
      <div class="estimate-top"><h4>${item.vehicle}</h4></div>
      <p class="estimate-price">${inr(item.estimatedFare)}</p>
      <p class="estimate-meta">Base ${inr(item.baseFare)} + ${item.travelDistance.toFixed(1)} km &times; Rs.${Math.round(item.perKm)}</p>
      ${item.driverAllowance > 0 ? `<p class="estimate-meta">Driver allowance: ${inr(item.driverAllowance)}</p>` : ''}
      <button class="estimate-select-btn" type="button">Select This Car &rarr;</button>
    `;

    card.querySelector('.estimate-select-btn').addEventListener('click', () => {
      // Build payload
      currentBookingPayload = {
        name:             nameVal,
        email:            emailVal,
        mobile:           mobileVal,
        pickup:           pickupVal,
        drop:             dropVal,
        date:             dateVal,
        time:             timeVal,
        vehicle:          item.vehicle,
        trip_type:        tripType,
        trip_days:        String(tripDays),
        distance_km:      item.travelDistance.toFixed(1),
        base_fare:        String(Math.round(item.baseFare)),
        per_km:           String(Math.round(item.perKm)),
        dist_charge:      String(Math.round(distCharge)),
        driver_allowance: String(Math.round(item.driverAllowance)),
        total_fare:       String(Math.round(item.estimatedFare)),
      };

      // Populate modal
      document.getElementById('modal-vehicle-icon').textContent = item.vehicle.charAt(0);
      document.getElementById('modal-vehicle-name').textContent = item.vehicle;
      document.getElementById('modal-name').textContent    = nameVal;
      document.getElementById('modal-email').textContent   = emailVal;
      document.getElementById('modal-mobile').textContent  = mobileVal;
      document.getElementById('modal-date').textContent    = dateVal;
      document.getElementById('modal-time').textContent    = timeVal;
      document.getElementById('modal-pickup').textContent  = pickupVal;
      document.getElementById('modal-drop').textContent    = dropVal;
      document.getElementById('modal-trip-type').textContent =
        tripType === 'two-way'
          ? `Round Trip (${tripDays} day${tripDays > 1 ? 's' : ''})`
          : 'One Way';
      document.getElementById('modal-distance').textContent = `${item.travelDistance.toFixed(1)} km`;

      document.getElementById('modal-base-fare').textContent   = inr(item.baseFare);
      document.getElementById('modal-dist-label').textContent  = item.travelDistance.toFixed(1);
      document.getElementById('modal-per-km').textContent      = Math.round(item.perKm).toLocaleString('en-IN');
      document.getElementById('modal-dist-charge').textContent = inr(distCharge);
      document.getElementById('modal-total-fare').textContent  = inr(item.estimatedFare);

      const allowanceRow = document.getElementById('modal-allowance-row');
      if (item.driverAllowance > 0) {
        document.getElementById('modal-driver-allowance').textContent = inr(item.driverAllowance);
        allowanceRow.hidden = false;
      } else {
        allowanceRow.hidden = true;
      }

      // Reset modal action state
      modalSuccessMsg.hidden = true;
      modalErrorMsg.hidden = true;
      whatsappBtn.hidden = true;
      confirmBtn.hidden = false;
      confirmLabel.hidden = false;
      confirmSpinner.hidden = true;
      confirmBtn.disabled = false;

      carModal.hidden = false;
      document.body.style.overflow = 'hidden';
    });

    resultsGrid.appendChild(card);
  });

  const summarySuffix = tripType === 'two-way' ? ` and ${tripDays} day(s)` : '';
  resultsSummary.textContent = `Based on ${distanceKm.toFixed(1)} km${summarySuffix}.`;

  // Existing user detail panel
  ['est-name','est-mobile','est-pickup','est-drop','est-date','est-time'].forEach((id) => {
    const el = document.getElementById(id);
    if (!el) return;
    const map = { 'est-name': nameVal, 'est-mobile': mobileVal, 'est-pickup': pickupVal,
                  'est-drop': dropVal, 'est-date': dateVal, 'est-time': timeVal };
    el.textContent = map[id];
  });

  hideForm();
  renderMessage(successMessage, '');
  renderMessage(errorMessage, '');
};
</script>
